name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns Pages on (source = GitHub Actions) if it isn't already.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Cache-bust assets with commit SHA
        # Rewrite every ?v=<token> in HTML/JS asset and data URLs to the short
        # commit SHA, so each deploy gets a fresh cache key (no manual bumping).
        # Operates on the checked-out copy only; the repo keeps the ?v=dev source.
        run: |
          SHA="${GITHUB_SHA::8}"
          grep -rlZ --include='*.html' --include='*.js' -F '?v=' . \
            | xargs -0 -r sed -i -E "s/\?v=[A-Za-z0-9._-]+/?v=${SHA}/g"
          echo "Cache-busted assets with v=${SHA}"

      - name: Upload site
        # Publish the repo root so the app is served at /occupancy/.
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
